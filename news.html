<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEWS | O-RA ～TOKYO～</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <style>
    .page-hero { padding:calc(var(--header-h) + 80px) 0 80px; text-align:center; background:var(--color-bg-3); border-bottom:1px solid var(--color-border); }
    .page-hero-eyebrow { font-family:var(--font-serif); font-size:11px; letter-spacing:0.4em; color:var(--color-gold); display:block; margin-bottom:16px; }
    .page-hero-title { font-family:var(--font-serif); font-size:clamp(28px,5vw,48px); font-weight:200; letter-spacing:0.2em; }

    #newsList { display: flex; flex-direction: column; gap: 0; }
    .news-item {
      border-bottom: 1px solid var(--color-border);
      padding: 36px 0;
    }
    .news-item:first-child { border-top: 1px solid var(--color-border); }
    .news-meta { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
    .news-date { font-size:12px; letter-spacing:0.1em; color:var(--color-muted); font-family:var(--font-serif); }
    .news-cat {
      font-size:10px; letter-spacing:0.2em;
      color:var(--color-gold);
      border:1px solid var(--color-border);
      padding:3px 10px;
    }
    .news-title {
      font-family:var(--font-serif);
      font-size:clamp(16px, 2vw, 20px);
      font-weight:300;
      letter-spacing:0.05em;
      color:var(--color-text);
      margin-bottom:12px;
      line-height:1.6;
    }
    .news-body {
      font-size:14px;
      color:var(--color-muted);
      line-height:1.9;
      max-width:680px;
    }
  </style>
</head>
<body>
  <header id="header" class="scrolled">
    <a class="header-logo" href="index.html">O · R · A</a>
    <nav class="header-nav">
      <a href="cast.html">CAST</a><a href="system.html">SYSTEM</a>
      <a href="gallery.html">GALLERY</a><a href="access.html">ACCESS</a>
      <a href="news.html" style="color:var(--color-gold);">NEWS</a>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="メニュー"><span></span><span></span><span></span></button>
    <a class="header-line" href="#" target="_blank" rel="noopener">LINE 予約</a>
  </header>
  <nav class="mobile-nav" id="mobileNav">
    <a href="cast.html">CAST</a><a href="system.html">SYSTEM</a>
    <a href="gallery.html">GALLERY</a><a href="access.html">ACCESS</a><a href="news.html">NEWS</a>
    <a class="header-line" href="#" target="_blank" rel="noopener">LINE 予約</a>
  </nav>

  <div class="page-hero">
    <span class="page-hero-eyebrow">NEWS</span>
    <h1 class="page-hero-title">お知らせ</h1>
  </div>

  <main>
    <section class="section">
      <div class="section-inner">
        <div id="newsList"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <p class="footer-logo">O · R · A ～ TOKYO ～</p>
      <nav class="footer-nav">
        <a href="cast.html">CAST</a><a href="system.html">SYSTEM</a>
        <a href="gallery.html">GALLERY</a><a href="access.html">ACCESS</a><a href="news.html">NEWS</a>
      </nav>
      <div class="footer-sns">
        <a href="#" target="_blank" rel="noopener">Instagram</a>
        <a href="#" target="_blank" rel="noopener">LINE</a>
      </div>
      <p class="footer-copy">&copy; 2025 O-RA ～TOKYO～ All Rights Reserved.</p>
    </div>
  </footer>

  <script src="js/scroll-anim.js"></script>
  <script src="js/news-render.js"></script>
  <script>
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => header.classList.toggle('scrolled', window.scrollY > 0));
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobileNav');
    hamburger.addEventListener('click', () => { hamburger.classList.toggle('open'); mobileNav.classList.toggle('open'); });
    renderNews('newsList');
  </script>
</body>
</html>
